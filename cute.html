<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sweet Page</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background-color: #ffeef5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: #ffffff;
        padding: 40px;
        width: 350px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(255, 182, 193, 0.4);
        text-align: center;
    }

    h1 {
        color: #ff6f91;
        margin-bottom: 10px;
    }

    p {
        color: #555;
        font-size: 14px;
        margin-bottom: 25px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 2px solid #ffd1dc;
        border-radius: 10px;
        outline: none;
        font-size: 14px;
    }

    button {
        background-color: #ff8fab;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 15px;
        cursor: pointer;
        font-size: 14px;
    }

    button:hover {
        background-color: #ff6f91;
    }

    .footer {
        margin-top: 20px;
        font-size: 12px;
        color: #aaa;
    }
</style>
</head>
<body>

<div class="card">
    <h1>Hello 💖</h1>
    <p>Welcome to my cute little webpage</p>
    
    <input type="text" placeholder="Your name">
    <input type="email" placeholder="Your email">
    
    <button>Send</button>
    
    <div class="footer">
        Made with love ✨
    </div>
</div>

</body>
</html>
